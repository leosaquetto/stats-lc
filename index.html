<!doctype html>
<html lang="pt-BR" style="background-color: #000000;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="stats.lc" />
    <title>stats.lc</title>

    <script>
      (function () {
        var standalone = window.navigator.standalone === true ||
          (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
        var screenHeight = window.screen && Number(window.screen.height);
        var viewportHeight = Number(window.innerHeight);
        var launchHeight = standalone && screenHeight > 0 ? screenHeight : viewportHeight;
        if (launchHeight > 0) {
          document.documentElement.style.setProperty('--stats-lc-launch-height', launchHeight + 'px');
        }
      })();
    </script>
    <style>
      html,
      body {
        width: 100%;
        min-height: var(--stats-lc-launch-height, 100svh);
        margin: 0;
        background: #000000;
      }

      #splash-screen {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        width: 100%;
        height: var(--stats-lc-launch-height, 100svh);
        min-height: var(--stats-lc-launch-height, 100svh);
        overflow: hidden;
        background: #000000;
        contain: strict;
      }
    </style>

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts with display=swap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png">
    <link rel="apple-touch-startup-image" href="/apple-startup-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/apple-startup-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/apple-startup-1206x2622.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/apple-startup-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/apple-startup-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/apple-startup-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/apple-startup-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/apple-startup-1320x2868.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/apple-startup-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="icon" type="image/svg+xml" href="/faveiconsvg_nobackground.svg">
    <link rel="shortcut icon" href="/favicon_png_black.png">
    <link rel="manifest" href="/manifest.json">
  </head>
  <body style="background-color: #000000;">
    <!-- Splash Screen Inline - aparece instantaneamente -->
    <div id="splash-screen" style="z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
      <!-- Logo animado -->
      <div style="display: flex; align-items: center; gap: 1rem; animation: splash-logo-in 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;">
        <div style="position: relative; width: 3rem; height: 3rem; display: flex; align-items: flex-end; justify-content: center; gap: 0.375rem;">
          <div style="position: absolute; inset: 0; background: rgba(249,115,22,0.2); filter: blur(18px); border-radius: 9999px;"></div>
          <span style="position: relative; width: 0.625rem; height: 100%; background: #f97316; border-radius: 9999px; transform-origin: bottom; animation: splash-eq-left 1.2s ease-in-out infinite;"></span>
          <span style="position: relative; width: 0.625rem; height: 100%; background: #f97316; border-radius: 9999px; transform-origin: bottom; animation: splash-eq-center 1.2s ease-in-out 0.15s infinite;"></span>
          <span style="position: relative; width: 0.625rem; height: 100%; background: #f97316; border-radius: 9999px; transform-origin: bottom; animation: splash-eq-right 1.2s ease-in-out 0.3s infinite;"></span>
        </div>
        <span style="color: #ffffff; font-size: 2.25rem; line-height: 1; font-weight: 900; letter-spacing: -0.03em; white-space: nowrap; animation: splash-wordmark-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.12s both;">stats.lc</span>
      </div>

      <!-- Frase -->
      <div style="text-align: center; color: rgba(255,255,255,0.5); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.01em; animation: splash-tagline-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;">
        sintonizando seu círculo...
      </div>

      <!-- Barra de progresso -->
      <div style="width: 12rem; height: 2px; margin-top: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 9999px; overflow: hidden;">
        <div style="height: 100%; width: 50%; background: linear-gradient(to right, transparent, #f97316, transparent); border-radius: 9999px; animation: loading-bar 1.5s linear infinite;"></div>
      </div>

      <!-- Rodapé -->
      <div style="position: absolute; bottom: max(2rem, env(safe-area-inset-bottom, 0px)); left: 0; right: 0; text-align: center;">
        <p style="color: rgba(255,255,255,0.3); font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em;">powered by stats.fm</p>
      </div>
    </div>
    <style>
      @keyframes loading-bar {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
      @keyframes splash-logo-in {
        0% { opacity: 0; transform: scale(0.92); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-wordmark-in {
        0% { opacity: 0; transform: translateX(-10px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes splash-tagline-in {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-eq-left {
        0%, 100% { transform: scaleY(0.65); opacity: 0.7; }
        50% { transform: scaleY(0.95); opacity: 1; }
      }
      @keyframes splash-eq-center {
        0%, 100% { transform: scaleY(0.85); opacity: 0.8; }
        50% { transform: scaleY(1.12); opacity: 1; }
      }
      @keyframes splash-eq-right {
        0%, 100% { transform: scaleY(0.55); opacity: 0.7; }
        50% { transform: scaleY(0.85); opacity: 1; }
      }
    </style>
    <script>
      window.__SPLASH_READY__ = false;
      window.__STATS_LC_HOME_READY__ = false;
      try {
        window.sessionStorage.removeItem('stats-lc-home-boot-ready');
      } catch {}
      window.__STATS_LC_DISMISS_SPLASH__ = function () {
        var splash = document.getElementById('splash-screen');
        if (!splash || splash.dataset.dismissed === '1') return;
        splash.dataset.dismissed = '1';
        window.__SPLASH_READY__ = true;
        splash.style.pointerEvents = 'none';
        splash.style.opacity = '0';
        splash.style.transition = 'opacity 0.35s ease-out';
        setTimeout(function () {
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 350);
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
